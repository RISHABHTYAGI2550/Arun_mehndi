name: mehndi_student_app
description: "Arun Mehndi Art and classes"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  http: ^1.2.0
  provider: ^6.1.2
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  cached_network_image: ^3.3.1
  convex_bottom_bar: ^3.2.0
  glassmorphism: ^3.0.0




  video_player: ^2.10.1
  chewie: ^1.7.4
  intl: ^0.19.0
  fluttertoast: ^8.2.4

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: PlayfairDisplay
      fonts:
        - asset: assets/fonts/PlayfairDisplay-VariableFont_wght.ttf

    - family: Inter
      fonts:
        - asset: assets/fonts/Inter_28pt-Regular.ttf
        - asset: assets/fonts/Inter_28pt-SemiBold.ttf


    - family: Cinzel
      fonts:
        - asset: assets/fonts/Cinzel-Regular.ttf

